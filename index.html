<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Works Portfolio｜AIで、つくる。</title>
<meta name="description" content="生成AIを活用して制作した成果物をまとめたポートフォリオ。ゲーム制作・インフォグラフィックなどの実績を掲載しています。">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%23ff2e8b'/%3E%3Cstop offset='1' stop-color='%237a3ff2'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='100' height='100' rx='24' fill='url(%23g)'/%3E%3Ctext x='50' y='70' font-size='58' text-anchor='middle' fill='white' font-family='sans-serif' font-weight='900'%3EA%3C/text%3E%3C/svg%3E">

<!-- OGP / Twitter Card -->
<meta property="og:type" content="website">
<meta property="og:title" content="AI Works Portfolio｜AIで、つくる。">
<meta property="og:description" content="生成AIを活用して制作した成果物をまとめたポートフォリオ。">
<meta property="og:image" content="https://ayknkmr0123.github.io/ai-works-portfolio/images/work-ai-tools.png">
<meta name="twitter:card" content="summary_large_image">

<style>
  :root{
    /* === design_prompt_unikoukokun.yaml 準拠 === */
    --canvas:#ffffff;
    --canvas-warm:#fff6ef;
    --surface:#fffaf6;
    --border:#f1e8e1;
    --ink:#2b2b2b;
    --ink-sub:#6b6b6b;
    --primary:#ff2e8b;
    --primary-deep:#e01f76;
    --primary-light:#ffd6e8;
    --orange:#ff7a1a;
    --amber:#ffab2e;
    --purple:#7a3ff2;
    --shadow-soft:0 8px 24px -6px rgba(120,60,30,.12);
    --shadow-float:0 16px 40px -10px rgba(120,60,30,.16);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;}
  body{
    font-family:"Noto Sans JP","Hiragino Sans","Yu Gothic UI",sans-serif;
    color:var(--ink);
    height:100vh;
    overflow:hidden;                 /* 1ページ・スクロールなし */
    display:flex;
    flex-direction:column;
    padding:clamp(24px,4vw,48px);
    background:
      radial-gradient(120% 90% at 100% 0%,#ffe9d6 0%,rgba(255,233,214,0) 55%),
      radial-gradient(120% 90% at 0% 100%,#ffe1ef 0%,rgba(255,225,239,0) 50%),
      var(--canvas-warm);
  }

  /* ── ヘッダー ── */
  header{flex:0 0 auto;margin-bottom:clamp(18px,3vh,32px);}
  .eyebrow{
    display:inline-block;font-size:12px;letter-spacing:.16em;font-weight:700;
    color:var(--primary);background:var(--primary-light);
    padding:5px 14px;border-radius:999px;
  }
  h1{
    font-size:clamp(34px,5.4vw,60px);font-weight:900;letter-spacing:-.01em;
    line-height:1.05;margin:12px 0 10px;
    background:linear-gradient(100deg,var(--primary) 0%,var(--purple) 100%);
    -webkit-background-clip:text;background-clip:text;color:transparent;
  }
  h1 .spark{-webkit-text-fill-color:initial;color:var(--amber);font-size:.7em;}
  .lead{font-size:clamp(13px,1.4vw,16px);color:var(--ink-sub);max-width:580px;}

  /* ── 作品グリッド ── */
  .gallery{
    flex:1 1 auto;min-height:0;display:grid;
    grid-template-columns:repeat(2,1fr);gap:clamp(16px,2.2vw,28px);
  }
  .card{
    position:relative;min-height:0;border:1px solid var(--border);
    border-radius:20px;overflow:hidden;background:var(--surface);cursor:pointer;
    display:flex;flex-direction:column;box-shadow:var(--shadow-soft);
    transition:transform .28s cubic-bezier(.4,.4,0,1),box-shadow .28s cubic-bezier(.4,.4,0,1);
  }
  .card:hover{transform:translateY(-6px);box-shadow:var(--shadow-float);}
  .card:focus-visible{outline:3px solid var(--primary);outline-offset:3px;}
  .thumb{
    flex:1 1 auto;min-height:0;display:flex;align-items:center;justify-content:center;
    padding:18px;background:radial-gradient(120% 120% at 50% 0%,#ffffff 0%,#fff1e6 100%);
  }
  .thumb img{max-width:100%;max-height:100%;object-fit:contain;border-radius:10px;}
  .meta{flex:0 0 auto;padding:14px 18px 16px;border-top:1px solid var(--border);background:#fff;}
  .meta h2{font-size:clamp(15px,1.6vw,18px);font-weight:700;}
  .tags{margin-top:9px;display:flex;gap:6px;flex-wrap:wrap;}
  .tag{
    font-size:11px;font-weight:700;color:var(--ink-sub);
    background:#f6efe9;border-radius:999px;padding:4px 11px;
  }
  .tag.ai{color:#fff;background:linear-gradient(100deg,var(--primary) 0%,var(--orange) 100%);}

  /* ── ライトボックス ── */
  .lb{
    position:fixed;inset:0;background:rgba(40,20,30,.78);display:none;
    align-items:center;justify-content:center;padding:5vh 5vw;z-index:50;
  }
  .lb.open{display:flex;}
  .lb img{max-width:100%;max-height:100%;object-fit:contain;border-radius:12px;box-shadow:0 24px 60px rgba(0,0,0,.45);}
  .lb-close{
    position:absolute;top:22px;right:26px;width:44px;height:44px;border-radius:50%;
    border:none;cursor:pointer;background:var(--primary);color:#fff;font-size:22px;
    box-shadow:var(--shadow-soft);transition:background .2s,transform .2s;
  }
  .lb-close:hover{background:var(--primary-deep);transform:scale(1.06);}

  /* ── レスポンシブ：狭い画面はスクロール許可で縦積み ── */
  @media(max-width:680px){
    body{overflow:auto;height:auto;min-height:100vh;}
    .gallery{grid-template-columns:1fr;}
    .card{min-height:60vh;}
  }
</style>
</head>
<body>

  <header>
    <span class="eyebrow">AI WORKS PORTFOLIO</span>
    <h1>AIで、つくる。<span class="spark">✨</span></h1>
    <p class="lead">生成AIを活用して制作した成果物をまとめています。各作品はクリックで拡大表示できます。</p>
  </header>

  <main class="gallery">

    <figure class="card" tabindex="0" role="button" aria-label="ネオン・テトリスを拡大表示" data-img="images/work-tetris.png">
      <div class="thumb">
        <img src="images/work-tetris.png" alt="ネオンカラーで描かれたブラウザ版テトリスゲームの画面" loading="lazy">
      </div>
      <figcaption class="meta">
        <h2>ネオン・テトリス（ブラウザゲーム）</h2>
        <div class="tags">
          <span class="tag ai">Made with Manus</span>
          <span class="tag">ゲーム制作</span>
          <span class="tag">Web</span>
        </div>
      </figcaption>
    </figure>

    <figure class="card" tabindex="0" role="button" aria-label="主要AIツール5選インフォグラフィックを拡大表示" data-img="images/work-ai-tools.png">
      <div class="thumb">
        <img src="images/work-ai-tools.png" alt="主要AIツール5選を紹介するインフォグラフィック" loading="lazy">
      </div>
      <figcaption class="meta">
        <h2>主要AIツール5選 インフォグラフィック</h2>
        <div class="tags">
          <span class="tag ai">NotebookLM</span>
          <span class="tag">情報設計</span>
          <span class="tag">デザイン</span>
        </div>
      </figcaption>
    </figure>

  </main>

  <!-- ライトボックス -->
  <div class="lb" id="lb" role="dialog" aria-modal="true" aria-label="作品の拡大表示">
    <button class="lb-close" id="lbClose" aria-label="閉じる">&times;</button>
    <img id="lbImg" src="" alt="">
  </div>

  <script>
    const lb = document.getElementById('lb');
    const lbImg = document.getElementById('lbImg');
    function openLb(card){
      lbImg.src = card.dataset.img;
      lbImg.alt = card.querySelector('img').alt;
      lb.classList.add('open');
    }
    function closeLb(){ lb.classList.remove('open'); lbImg.src=''; }
    document.querySelectorAll('.card').forEach(card=>{
      card.addEventListener('click',()=>openLb(card));
      card.addEventListener('keydown',e=>{
        if(e.key==='Enter'||e.key===' '){ e.preventDefault(); openLb(card); }
      });
    });
    document.getElementById('lbClose').addEventListener('click',closeLb);
    lb.addEventListener('click',e=>{ if(e.target===lb) closeLb(); });
    document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeLb(); });
  </script>

</body>
</html>
