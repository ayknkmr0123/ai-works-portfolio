<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 - ページが見つかりません｜AI Works Portfolio</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%23007cff'/%3E%3Cpath d='M16 6l7 10-7 10-7-10z' fill='white'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root{--bg:#fff;--text:#1a2233;--text-sub:#5a6478;--blue:#007cff;--blue-dark:#0056b3;--blue-soft:#e6f2ff;--coral-soft:#fff4f2;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;font-family:"Noto Sans JP",system-ui,sans-serif;color:var(--text);padding:24px;background:radial-gradient(circle at 85% 15%,var(--blue-soft),transparent 45%),radial-gradient(circle at 10% 90%,var(--coral-soft),transparent 40%),var(--bg);}
  .code{font-size:clamp(4rem,16vw,8rem);font-weight:800;color:var(--blue);line-height:1;}
  h1{font-size:1.3rem;margin:12px 0 8px;}
  p{color:var(--text-sub);margin-bottom:28px;}
  a{display:inline-block;padding:13px 30px;border-radius:999px;background:var(--blue);color:#fff;font-weight:700;text-decoration:none;box-shadow:0 8px 20px rgba(0,124,255,.25);transition:background .2s,transform .2s;}
  a:hover{background:var(--blue-dark);transform:translateY(-2px);}
</style>
</head>
<body>
  <div>
    <div class="code">404</div>
    <h1>ページが見つかりません</h1>
    <p>お探しのページは移動または削除された可能性があります。</p>
    <a href="/ai-works-portfolio/">トップへ戻る</a>
  </div>
</body>
</html>
