<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404｜AI Works Portfolio</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    font-family:"Noto Sans JP","Hiragino Sans","Yu Gothic UI",sans-serif;color:#2b2b2b;
    min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:32px;
    background:
      radial-gradient(120% 90% at 100% 0%,#ffe9d6 0%,rgba(255,233,214,0) 55%),
      radial-gradient(120% 90% at 0% 100%,#ffe1ef 0%,rgba(255,225,239,0) 50%),
      #fff6ef;
  }
  .code{
    font-size:clamp(64px,16vw,140px);font-weight:900;line-height:1;
    background:linear-gradient(100deg,#ff2e8b,#7a3ff2);
    -webkit-background-clip:text;background-clip:text;color:transparent;
  }
  p{color:#6b6b6b;margin:12px 0 28px;}
  a{
    display:inline-block;text-decoration:none;font-weight:700;color:#fff;
    background:linear-gradient(100deg,#ff2e8b,#ff7a1a);
    padding:12px 26px;border-radius:999px;
    box-shadow:0 8px 24px -6px rgba(120,60,30,.16);transition:transform .2s;
  }
  a:hover{transform:translateY(-2px);}
</style>
</head>
<body>
  <div class="code">404</div>
  <p>お探しのページは見つかりませんでした。</p>
  <a href="./">トップへ戻る</a>
</body>
</html>
