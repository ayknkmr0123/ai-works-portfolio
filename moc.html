<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Works — MOC</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    /* design_prompt.yaml : 白基調＋ブルー主役＋コーラル/イエロー差し色 */
    --bg:#ffffff;--bg-sub:#f7f9fc;--text:#1a2233;--text-sub:#5a6478;
    --blue:#007cff;--blue-dark:#0056b3;--blue-soft:#e6f2ff;--coral:#ff6b5c;--yellow:#ffe14d;--line:#e6eaf2;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:"Noto Sans JP",system-ui,sans-serif;line-height:1.8;}
  .wrap{max-width:960px;margin:0 auto;padding:0 22px;}

  /* Hero */
  .hero{position:relative;text-align:center;padding:120px 22px 90px;overflow:hidden;
    background:radial-gradient(circle at 85% 15%, var(--blue-soft), transparent 45%),
               radial-gradient(circle at 10% 90%, #fff4f2, transparent 40%), var(--bg);}
  .hero h1{position:relative;font-size:clamp(2rem,6vw,3.4rem);font-weight:800;line-height:1.3;}
  .hero h1 .accent{color:var(--blue);position:relative;}
  .hero h1 .accent::after{content:"";position:absolute;left:0;right:0;bottom:.08em;height:.28em;background:var(--yellow);z-index:-1;opacity:.85;border-radius:4px;}
  .hero p{position:relative;color:var(--text-sub);margin-top:16px;}
  .cta{display:inline-block;margin-top:26px;padding:13px 30px;border-radius:999px;background:var(--blue);color:#fff;font-weight:700;box-shadow:0 8px 20px rgba(0,124,255,.25);}

  /* Works */
  h2{text-align:center;font-size:1.6rem;font-weight:800;margin:64px 0 28px;}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:22px;padding-bottom:90px;}
  .card{background:#fff;border:1px solid var(--line);border-radius:18px;overflow:hidden;transition:transform .3s,box-shadow .3s;}
  .card:hover{transform:translateY(-5px);box-shadow:0 16px 38px rgba(26,34,51,.1);}
  .card img{width:100%;aspect-ratio:16/10;object-fit:cover;display:block;}
  .card .b{padding:15px 17px 18px;}
  .card h3{font-size:.98rem;font-weight:700;}
  .tag{display:inline-block;font-size:.68rem;margin-top:10px;padding:4px 11px;border-radius:999px;border:1px solid var(--blue-soft);background:var(--blue-soft);color:var(--blue);}
  .tag.coral{border-color:#ffe2de;background:#fff4f2;color:var(--coral);}
</style>
</head>
<body>
  <section class="hero">
    <h1>AIで<span class="accent">“作れる”</span>を形にする。</h1>
    <p>AI制作物のポートフォリオ（最小モック）</p>
    <a href="#works" class="cta">作品を見る ↓</a>
  </section>

  <div class="wrap">
    <h2 id="works">制作実績</h2>
    <div class="grid">
      <div class="card">
        <img src="images/work01-tetris.png" alt="Tetris ゲーム">
        <div class="b"><h3>Tetris ゲーム</h3><span class="tag">Manus</span></div>
      </div>
      <div class="card">
        <img src="images/work02-infographic.png" alt="AIツール解説図">
        <div class="b"><h3>AIツール解説インフォグラフィック</h3><span class="tag coral">NotebookLM</span></div>
      </div>
    </div>
  </div>
</body>
</html>
